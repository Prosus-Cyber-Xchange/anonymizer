services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  anonymizer:
    build:
      context: ../../..
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - LOG_LEVEL=INFO
      - PRIVACY_CACHE_ENABLED=true
      - PRIVACY_CACHE_REDIS_ADDR=redis:6379
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "-T", "5", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  litellm:
    build:
      context: litellm
    ports:
      - "4000:4000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      anonymizer:
        condition: service_healthy
